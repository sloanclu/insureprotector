[build]
  publish = "."

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://connect.facebook.net; connect-src 'self' https://connect.facebook.net https://www.facebook.com https://ipapi.co; img-src 'self' data: https://www.facebook.com https://connect.facebook.net https://files.manuscdn.com; style-src 'self' 'unsafe-inline'; font-src 'self' data:; frame-src 'self' https://www.facebook.com"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
